name: Build Windows exe

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Freezes main.py + all parser dependencies (regipy, evtx, olefile,
      # LnkParse3, libscca-python) into a standalone pipeline the packaged
      # app can run with no separate Python install — verified locally to
      # produce byte-for-byte identical parsing output to the venv+python.exe
      # dev path. --collect-data regipy is required: PyInstaller's static
      # import analysis doesn't see regipy/plugins/validated_plugins.json
      # since it's a data file, not a module, and misses it without this.
      - name: Build standalone pipeline (PyInstaller)
        run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller --onedir --name windows-analysis-pipeline --collect-data regipy --distpath pyinstaller-dist --workpath pyinstaller-build --specpath pyinstaller-build main.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: viewer
        run: npm ci

      - name: Build portable .exe
        working-directory: viewer
        env:
          # Skip electron-builder's macOS code-signing tool download — not
          # needed for an unsigned Windows portable build, and extracting it
          # requires a symlink privilege some runners/accounts don't have.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:win

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-Analysis-Viewer
          path: viewer/release/*.exe
          if-no-files-found: error

      # The release version comes from viewer/package.json — bump that field
      # to cut a new version. Pushing the same version again just updates that
      # release's exe in place.
      - name: Read version
        id: ver
        run: echo "version=$((Get-Content viewer/package.json | ConvertFrom-Json).version)" >> $env:GITHUB_OUTPUT

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          make_latest: true
          files: viewer/release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
