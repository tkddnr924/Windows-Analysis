name: Build Windows exe

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build portable .exe
        env:
          # Skip electron-builder's macOS code-signing tool download — not
          # needed for an unsigned Windows portable build, and extracting it
          # requires a symlink privilege some runners/accounts don't have.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:win

      - uses: actions/upload-artifact@v4
        with:
          name: Windows-Analysis-Viewer
          path: viewer/release/*.exe
          if-no-files-found: error

      # Every push to main updates this same "latest" release in place —
      # rolling build, not one release per commit — so there's always a
      # single, stable download link on the repo's Releases page.
      - name: Publish to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          make_latest: true
          files: viewer/release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
